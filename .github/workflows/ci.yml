name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Apply database schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -f supabase/ci-shim.sql
          psql -h localhost -U postgres -d postgres -f supabase/schema.sql
          psql -h localhost -U postgres -d postgres -f supabase/migrations/migrate_event_date_to_start_time.sql
          psql -h localhost -U postgres -d postgres -f supabase/ci-shim-grants.sql

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: npx vitest run

      - name: Build
        env:
          NEXTAUTH_SECRET: ci-dummy-secret-not-used-in-production
          NEXTAUTH_URL: http://localhost:3000
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
        run: npx next build
